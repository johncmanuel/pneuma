name: Wails build

on:
  push:
    tags:
      - "*"
  workflow_dispatch: {}

env:
  APP_NAME: "pneuma"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: "linux/amd64"
            os: "ubuntu-22.04"
          - platform: "windows/amd64"
            os: "windows-latest"
          - platform: "darwin/universal"
            os: "macos-latest"

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Wails Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Inject version into wails.json from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-1.0.0}"
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.tmp.json && mv wails.tmp.json wails.json
          echo "Building version: $VERSION"

      - name: Build wails
        run: wails build -platform ${{ matrix.build.platform }}

      - name: Build Windows NSIS installer
        if: runner.os == 'Windows'
        run: wails build -platform windows/amd64 -nsis -webview2 embed

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: zip -r build/bin/pneuma-macos-universal.zip build/bin/pneuma.app

      # TODO: look more into this
      # - name: Create macOS DMG
      #   if: runner.os == 'macOS'
      #   env:
      #     MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      #     MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      #     MACOS_CERT_IDENTITY: ${{ secrets.MACOS_CERT_IDENTITY }}
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   maybe some script here to create + sign dmg
      #   run: bash build/darwin/create-dmg.sh

      - name: Rename Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION=$(jq -r '.info.productVersion' wails.json)
          mv build/bin/pneuma "build/bin/pneuma-${VERSION}-linux-amd64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pneuma-desktop-${{ matrix.build.os }}
          path: build/bin/pneuma-*
          retention-days: 1

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: pneuma-desktop-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: false
