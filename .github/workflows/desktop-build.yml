name: Wails build

on:
  push:
    tags:
      - "*"
  workflow_dispatch: {}

env:
  APP_NAME: "pneuma"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: "linux/amd64"
            os: "ubuntu-22.04"
          - platform: "windows/amd64"
            os: "windows-latest"
          - platform: "darwin/universal"
            os: "macos-latest"

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Wails Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build wails
        run: wails build -platform ${{ matrix.build.platform }}

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: zip -r build/bin/pneuma-macos-universal.zip build/bin/pneuma.app

      - name: Rename Linux binary
        if: runner.os == 'Linux'
        run: mv build/bin/pneuma build/bin/pneuma-linux-amd64

      - name: Rename Windows binary
        if: runner.os == 'Windows'
        shell: bash
        run: mv build/bin/pneuma.exe build/bin/pneuma-windows-amd64.exe

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pneuma-desktop-${{ matrix.build.os }}
          path: build/bin/pneuma-*
          retention-days: 1

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: pneuma-desktop-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: false
