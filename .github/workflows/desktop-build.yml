# https://wails.io/docs/guides/crossplatform-build
# https://github.com/dAppServer/wails-build-action/blob/main/action.yml

name: Wails build

on:
  push:
    tags:
      # Match any new tag (e.g., v1.0.0)
      - "*"

env:
  # Necessary for most environments as build failure can occur due to OOM issues
  NODE_OPTIONS: "--max-old-space-size=4096"

  APP_NAME: "pneuma"

jobs:
  build:
    strategy:
      # Failure in one platform build won't impact the others
      fail-fast: false
      matrix:
        build:
          - platform: "linux/amd64"
            os: "ubuntu-latest"
          - platform: "windows/amd64"
            os: "windows-latest"
          - platform: "darwin/universal"
            os: "macos-latest"

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wails
        uses: dAppServer/wails-build-action@v2.2
        id: build
        with:
          build-name: ${{ env.APP_NAME }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: "1.23"
          # need to keep node at 22.x rather than latest to avoid build issues with
          # libwebkit2gtk-4.0-dev (AFAIK, ubuntu 24 drops this specific package). This
          # version is needed to work with wails
          # See linux installation here: https://wails.io/docs/gettingstarted/installation/
          node-version: "22.x"
