<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111318" />
    <title>pneuma is offline :(</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111318;
        --surface: #171a20;
        --border: #2c313a;
        --text-1: #e8edf5;
        --text-2: #a6afbe;
        --accent: #37ab86;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        font-family: "Segoe UI", "SF Pro Text", "Noto Sans", sans-serif;
        background: radial-gradient(circle at 20% 0%, #1b2533, var(--bg) 40%);
        color: var(--text-1);
      }

      .card {
        width: min(460px, 100%);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: linear-gradient(
          160deg,
          rgba(55, 171, 134, 0.14),
          var(--surface) 35%
        );
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      p {
        margin: 10px 0 0;
        line-height: 1.5;
        color: var(--text-2);
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid var(--border);
        min-height: 40px;
        padding: 0 16px;
        font-size: 14px;
        text-decoration: none;
        color: var(--text-1);
        background: #1d2129;
      }

      .primary {
        border-color: transparent;
        background: var(--accent);
        color: #0f1614;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-live="polite">
      <h1>You are offline</h1>
      <p>
        pneuma cannot reach the server right now. Reconnect to your network and
        retry.
      </p>
      <div class="actions">
        <a class="primary" href="./">Try again</a>
        <a href="./">Open player</a>
      </div>
    </main>
  </body>
</html>
