version: "2"
sql:
  # Server database
  - engine: "sqlite"
    queries: "internal/store/sqlite/sql/server/query"
    schema: "internal/store/sqlite/sql/server/migrations"
    gen:
      go:
        package: "serverdb"
        out: "internal/store/sqlite/serverdb"
        overrides:
          - column: "users.is_admin"
            go_type: "bool"
          - column: "users.can_upload"
            go_type: "bool"
          - column: "users.can_edit"
            go_type: "bool"
          - column: "users.can_delete"
            go_type: "bool"

  # Desktop database (mainly for caching)
  - engine: "sqlite"
    queries: "internal/store/sqlite/sql/desktop/query"
    schema: "internal/store/sqlite/sql/desktop/migrations"
    gen:
      go:
        package: "desktopdb"
        out: "internal/store/sqlite/desktopdb"
